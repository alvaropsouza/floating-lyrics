name: floating_lyrics_ui
description: Frontend Flutter para Floating Lyrics
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebSocket client
  web_socket_channel: ^3.0.3
  
  # HTTP client (tradução de letras)
  http: ^1.2.0
  
  # State management
  provider: ^6.1.1
  
  # Janela customizada (frameless, draggable)
  bitsdojo_window: ^0.1.6
  window_manager: ^0.5.1
  
  # System tray
  system_tray: ^2.0.3
  
  # JSON
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Fontes customizadas (opcional)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
  #       - asset: fonts/Roboto-Bold.ttf
  #         weight: 700
